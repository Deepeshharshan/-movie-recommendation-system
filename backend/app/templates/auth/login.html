{% extends "base.html" %}
{% block title %}Log In - CineMatch{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="auth-subtitle">Log in to get personalized recommendations.</p>
        <form method="post">
            <label for="username">Username or Email</label>
            <input type="text" id="username" name="username" value="{{ username or '' }}" required autofocus>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <label class="checkbox-label">
                <input type="checkbox" name="remember"> Remember me
            </label>

            <button type="submit" class="btn-primary full-width">Log In</button>
        </form>
        <p class="auth-switch">Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up</a></p>
    </div>
</section>
{% endblock %}
