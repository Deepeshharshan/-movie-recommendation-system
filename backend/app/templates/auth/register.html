{% extends "base.html" %}
{% block title %}Sign Up - CineMatch{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">
        <h1>Create your account</h1>
        <p class="auth-subtitle">Join to save favorites and get personalized picks.</p>
        <form method="post">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" value="{{ username or '' }}" required autofocus minlength="3">

            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ email or '' }}" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6">

            <button type="submit" class="btn-primary full-width">Sign Up</button>
        </form>
        <p class="auth-switch">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
    </div>
</section>
{% endblock %}
