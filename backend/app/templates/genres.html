{% extends "base.html" %}
{% block title %}Browse Genres - CineMatch{% endblock %}
{% block content %}
<section class="row-section">
    <h2>Browse by Genre</h2>
    <div class="genre-grid">
        {% for genre in genres %}
            <a href="{{ url_for('movies.genre_movies', genre_id=genre.id) }}" class="genre-tile">{{ genre.name }}</a>
        {% endfor %}
    </div>
</section>
{% endblock %}
