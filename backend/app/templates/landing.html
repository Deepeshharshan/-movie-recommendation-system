<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionCine | Get Started</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='spatial/landing.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="landing-container">
        <!-- Left Pane: Branding and Steps -->
        <div class="left-pane">
            <div class="brand">
                <span class="logo-icon"></span> VISIONCINE
            </div>
            
            <div class="steps-container">
                <h1>Get Started with Us</h1>
                <p>Complete these easy steps to register your account.</p>
                
                <div class="step active">
                    <span class="step-num">1</span> Sign up your account
                </div>
                <div class="step">
                    <span class="step-num">2</span> Set up your preferences
                </div>
                <div class="step">
                    <span class="step-num">3</span> Set up your profile
                </div>
            </div>
        </div>

        <!-- Right Pane: Registration Form -->
        <div class="right-pane">
            <div class="form-wrapper">
                <h2>Sign Up Account</h2>
                <p class="subtitle">Enter your personal data to create your account.</p>
                
                <div class="oauth-buttons">
                    <button class="oauth-btn">
                        <!-- Google SVG -->
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Google
                    </button>
                    <button class="oauth-btn">
                        <!-- Github SVG -->
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.268 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.293 2.747-1.025 2.747-1.025.546 1.379.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"/>
                        </svg>
                        Github
                    </button>
                </div>
                
                <div class="divider"><span>Or</span></div>
                
                <!-- Connects via Javascript API now -->
                <form id="signup-form">
                    <div class="input-row">
                        <div class="input-group">
                            <label>First Name</label>
                            <input type="text" id="reg-fname" placeholder="eg. John" required>
                        </div>
                        <div class="input-group">
                            <label>Last Name</label>
                            <input type="text" id="reg-lname" placeholder="eg. Francisco" required>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="reg-email" placeholder="eg. johnfrans@gmail.com" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="reg-password" placeholder="Enter your password" required>
                        <span class="password-hint">Must be at least 8 characters.</span>
                    </div>
                    
                    <button type="submit" class="signup-submit">Sign Up</button>
                </form>
                
                <p class="login-link">Already have an account? <a href="index.html">Log in</a></p>
            </div>
        </div>
    </div>
    <!-- API and Auth Integration -->
    <script src="{{ url_for('static', filename='spatial/api.js') }}"></script>
    <script src="{{ url_for('static', filename='spatial/landing.js') }}"></script>
</body>
</html>
