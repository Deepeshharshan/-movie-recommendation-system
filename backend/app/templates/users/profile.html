{% extends "base.html" %}
{% block title %}My Profile - CineMatch{% endblock %}
{% block content %}
<section class="profile-page">
    <div class="profile-header">
        <div class="profile-avatar">{{ current_user.username[0]|upper }}</div>
        <div>
            <h1>{{ current_user.username }}</h1>
            <p>{{ current_user.email }}</p>
        </div>
    </div>

    <div class="stats-grid">
        <a href="{{ url_for('users.favorites') }}" class="stat-card">
            <span class="stat-number">{{ favorites_count }}</span>
            <span class="stat-label">Favorites</span>
        </a>
        <a href="{{ url_for('users.watchlist') }}" class="stat-card">
            <span class="stat-number">{{ watchlist_count }}</span>
            <span class="stat-label">Watchlist</span>
        </a>
        <a href="{{ url_for('users.ratings') }}" class="stat-card">
            <span class="stat-number">{{ ratings_count }}</span>
            <span class="stat-label">Ratings</span>
        </a>
    </div>
</section>
{% endblock %}
