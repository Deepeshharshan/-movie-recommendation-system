# =============================================================================
# VISIONCINE — CI Stack: Jenkins + SonarQube + PostgreSQL
# docker-compose -f ci/docker-compose.ci.yml up -d
# =============================================================================

version: "3.9"

services:

  # ── Jenkins ───────────────────────────────────────────────────────────────
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: visioncine_jenkins
    restart: unless-stopped
    user: root                          # needs root to mount Docker socket
    ports:
      - "8080:8080"                     # Jenkins UI
      - "50000:50000"                   # Agent port
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock   # Docker-in-Docker access
    networks:
      - ci_net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ── SonarQube Community Edition ───────────────────────────────────────────
  sonarqube:
    image: sonarqube:community
    container_name: visioncine_sonarqube
    restart: unless-stopped
    depends_on:
      sonar_db:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonar_db:5432/sonarqube
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - ci_net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s

  # ── PostgreSQL for SonarQube ──────────────────────────────────────────────
  sonar_db:
    image: postgres:15-alpine
    container_name: visioncine_sonar_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonarqube
    volumes:
      - sonar_postgres_data:/var/lib/postgresql/data
    networks:
      - ci_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 10

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  jenkins_home:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonar_postgres_data:

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  ci_net:
    driver: bridge
