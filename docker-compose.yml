# =============================================================================
# VISIONCINE — docker-compose.yml
# Local development stack with hot-reload + persistent SQLite volume
# =============================================================================

version: "3.9"

services:

  # ── Flask API (served by gunicorn in prod, flask dev server locally) ─────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime          # use the final runtime stage
    image: visioncine:latest
    container_name: visioncine_api
    restart: unless-stopped

    # ── Port mapping: host:container ──────────────────────────────────────────
    ports:
      - "5002:5002"

    # ── Environment (loaded from .env.docker at repo root) ───────────────────
    env_file:
      - ../.env.docker
    environment:
      - DATABASE_URL=sqlite:////app/instance/app.db

    # ── Persist the SQLite database across container restarts ─────────────────
    volumes:
      - db_data:/app/instance

    # ── Health check mirroring the Dockerfile HEALTHCHECK ────────────────────
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5002/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# ── Named volume so SQLite data is not lost on container stop ─────────────────
volumes:
  db_data:
    driver: local
