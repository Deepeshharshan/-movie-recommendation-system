<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Vision | Movie Recommendations</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Feedback Alert System -->
    <div id="feedback-layer" class="feedback-layer hidden">
        <div class="glass-alert" id="feedback-message"></div>
    </div>

    <!-- Main Spatial Interface -->
    <div class="spatial-app-container">
        
        <!-- Navbar -->
        <nav class="glass-nav">
            <div class="nav-brand">VISION<span class="brand-accent">CINE</span></div>
            <div class="search-container">
                <input type="text" id="search-input" class="glass-input" placeholder="Search for movies...">
            </div>
            <div class="user-profile"></div>
        </nav>

        <!-- Massive Hero Showcase -->
        <header class="hero-canvas" id="hero-showcase">
            <div class="hero-content">
                <h1 class="hero-title skeleton-text" id="hero-title">Featured Movie</h1>
                <p class="hero-desc skeleton-text-multiline" id="hero-desc">Discover the next generation of cinematic experiences.</p>
                <button class="glass-btn primary" id="hero-action">Watch Trailer</button>
            </div>
            <div class="hero-shadow-shield"></div>
        </header>

        <!-- Movie Grid Array -->
        <main class="content-section">
            <h2 class="section-heading">Recommended for You</h2>
            
            <div class="movie-grid" id="movie-grid">
                <!-- Skeletons placeholders -->
                <div class="movie-card skeleton-card"></div>
                <div class="movie-card skeleton-card"></div>
                <div class="movie-card skeleton-card"></div>
                <div class="movie-card skeleton-card"></div>
            </div>
        </main>

    </div>

    <!-- Movie Details & Rating Modal -->
    <div id="movie-modal" class="modal hidden">
        <div class="modal-content">
            <span id="close-modal" class="close-btn">&times;</span>
            <div class="modal-body centered-modal">
                <img id="modal-img" src="" alt="Movie Poster" class="modal-poster">
                <div class="modal-info">
                    <h2 id="modal-title">Movie Title</h2>
                    <div class="modal-meta">
                        <span id="modal-year">2024</span> &bull; 
                        <span id="modal-genre" class="genre-tag">Sci-Fi</span> &bull;
                        <span id="modal-reviews" class="reviews-tag">1,200 Reviews</span>
                    </div>
                    <p id="modal-desc">Movie description goes here.</p>
                    
                    <div class="rating-box">
                        <div class="current-rating">Rating: <span id="modal-rating">5.0</span>/5 ⭐️</div>
                        <div class="rate-action">
                            <select id="user-rating-input" class="glass-input rating-select">
                                <option value="5">5 Stars</option>
                                <option value="4">4 Stars</option>
                                <option value="3">3 Stars</option>
                                <option value="2">2 Stars</option>
                                <option value="1">1 Star</option>
                            </select>
                            <button id="submit-rating-btn" class="glass-btn primary small-btn">Submit Rating</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
