# =============================================================================
# SonarQube Project Configuration — VISIONCINE
# =============================================================================

sonar.projectKey=visioncine
sonar.projectName=VisionCine Movie Recommendation System
sonar.projectVersion=1.0

# Source code location
sonar.sources=backend/app
sonar.language=py

# Exclusions
sonar.exclusions=\
  **/__pycache__/**,\
  **/*.pyc,\
  **/venv/**,\
  **/.venv*/**,\
  **/migrations/**,\
  **/tests/**,\
  **/static/**,\
  **/.git/**

# Coverage
sonar.python.coverage.reportPaths=backend/coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Links
sonar.links.scm=https://github.com/Deepeshharshan/-movie-recommendation-system
